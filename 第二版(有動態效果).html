                    transformStyle = 'translateX(-110%) scale(0.8) translateZ(-50px) rotateY(35deg)';
                    opacity = 0.5;
                    zIndex = 10;
                    pointerEvents = 'auto';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                    card.style.boxShadow = 'none';
                } else if (diff === 1) {
                    // 右側鄰近卡片：偏右、縮小 + 向左旋轉 35 度，展現 3D 厚度
                    transformStyle = 'translateX(110%) scale(0.8) translateZ(-50px) rotateY(-35deg)';
                    opacity = 0.5;
                    zIndex = 10;
                    pointerEvents = 'auto';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                    card.style.boxShadow = 'none';
                } else {
                    // 遠端其他卡片：隱藏在背景中並轉為大角度
                    transformStyle = diff < 0 
                        ? 'translateX(-220%) scale(0.6) translateZ(-150px) rotateY(55deg)' 
                        : 'translateX(220%) scale(0.6) translateZ(-150px) rotateY(-55deg)';
                    opacity = 0;
                    zIndex = 0;
                    pointerEvents = 'none';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                    card.style.boxShadow = 'none';
                }

                // 寫入 CSS 觸發過渡動畫
                card.style.transform = transformStyle;
                card.style.opacity = opacity;
                card.style.zIndex = zIndex;
                card.style.pointerEvents = pointerEvents;
            });
        }

        // 5. 切換到特定索引
        function setActiveIndex(index) {
            if (index < 0) {
                activeIndex = SECTIONS.length - 1;
            } else if (index >= SECTIONS.length) {
                activeIndex = 0;
            } else {
                activeIndex = index;
            }
            updateCarousel();
        }

        // 6. 前後切換
        function prevSlide() {
            setActiveIndex(activeIndex - 1);
        }

        function nextSlide() {
            setActiveIndex(activeIndex + 1);
        }

        // 7. 側邊選單開關控制器
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            
            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            } else {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                sidebar.classList.remove('-translate-x-full');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        // 8. 統一跳轉控制（支援跳轉指定子頁面與特定錨點小標題）
        function jumpToSection(index, elementId = null) {
            activeIndex = index;
            updateCarousel();
            
            // 進入目標頁面
            enterCurrentSection();
            closeSidebar();

            // 如果有特定錨點，等待渲染完成後平滑滾動至對應段落
            if (elementId) {
                setTimeout(() => {
                    const targetEl = document.getElementById(elementId);
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 350); // 配合翻頁 3D 動畫完結後再滾動
            }
        }

        // 9. 鍵盤事件與 iframe 焦點自動鎖定
        window.addEventListener('keydown', function(event) {
            const isContentOpen = !document.getElementById('content-container').classList.contains('hidden');
            
            if (isContentOpen) {
                if (event.key === "ArrowLeft") {
                    switchContentSection(-1);
                } else if (event.key === "ArrowRight") {
                    switchContentSection(1);
                } else if (event.key === "Escape") {
                    goToHome();
                }
            } else {
                if (event.key === "ArrowLeft") {
                    prevSlide();
                } else if (event.key === "ArrowRight") {
                    nextSlide();
                } else if (event.key === "Enter") {
                    enterCurrentSection();
                }
            }
        });

        // 確保任何地方被點擊時，預覽視窗都能自動獲取鍵盤焦點
        document.body.addEventListener('click', () => {
            window.focus();
        });

        // 10. 進入當前主題詳細頁面
        function enterCurrentSection() {
            const item = SECTIONS[activeIndex];
            
            // 填入標題與章節索引
            document.getElementById('current-section-title').innerText = item.title;
            document.getElementById('current-section-index').innerText = `${activeIndex + 1} / ${SECTIONS.length}`;
            
            // 渲染內容
            document.getElementById('content-display-box').innerHTML = item.content;

            // 觸發翻頁 3D 入場特效
            const landing = document.getElementById('landing-page');
            const content = document.getElementById('content-container');

            landing.style.transform = 'scale(0.9) translateZ(-100px)';
            landing.style.opacity = '0';
            
            setTimeout(() => {
                landing.classList.add('hidden');
                content.classList.remove('hidden');
                content.scrollTop = 0; // 置頂
            }, 300);
        }

        // 11. 橫向子頁面切換 (進入詳細頁面後的快捷導覽)
        function switchContentSection(direction) {
            let nextIdx = activeIndex + direction;
            if (nextIdx < 0) nextIdx = SECTIONS.length - 1;
            if (nextIdx >= SECTIONS.length) nextIdx = 0;
            
            activeIndex = nextIdx;
            
            // 更新首頁輪播狀態（以便返回時位置正確）
            updateCarousel();
            
            // 更新內容視窗
            const item = SECTIONS[activeIndex];
            document.getElementById('current-section-title').innerText = item.title;
            document.getElementById('current-section-index').innerText = `${activeIndex + 1} / ${SECTIONS.length}`;
            
            // 加點淡入動畫效果
            const displayBox = document.getElementById('content-display-box');
            displayBox.style.opacity = '0';
            setTimeout(() => {
                displayBox.innerHTML = item.content;
                displayBox.style.opacity = '1';
                document.getElementById('content-container').scrollTop = 0; // 置頂
            }, 150);
        }

        // 12. 回到首頁大廳
        function goToHome() {
            const landing = document.getElementById('landing-page');
            const content = document.getElementById('content-container');

            content.classList.add('hidden');
            landing.classList.remove('hidden');
            
            // 動態恢復首頁位置與透明度
            setTimeout(() => {
                landing.style.transform = 'scale(1) translateZ(0)';
                landing.style.opacity = '1';
                updateCarousel();
            }, 50);
        }

        // 啟動初始化
        window.onload = function() {
            initCarousel();
            // 自動聚焦，點開即啟用鍵盤控制
            window.focus();
        };
    </script>
</body>
</html>
